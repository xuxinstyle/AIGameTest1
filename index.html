<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>机器人打飞机</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="hud">
      <span>得分 <strong id="score">0</strong></span>
      <span>关卡 <strong id="stage">1</strong></span>
      <span>目标 <strong id="stageTarget">200</strong></span>
      <span>生命 <strong id="lives">3</strong></span>
      <span>波次 <strong id="wave">1</strong></span>
    </header>
    <canvas id="game" width="480" height="720" aria-label="游戏画布"></canvas>
    <p class="hint" id="hint">← → 或 A D 移动 · 自动开火 · Enter 开始/重开</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
